version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: leadgen
      POSTGRES_USER: leadgen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadgen"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # To enable GPU on Windows with NVIDIA, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://leadgen:${POSTGRES_PASSWORD}@postgres:5432/leadgen
      DATABASE_URL_SYNC: postgresql://leadgen:${POSTGRES_PASSWORD}@postgres:5432/leadgen
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      CORS_ORIGINS: '["http://localhost:3000"]'
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_SCORING_MODEL: llama3.1:8b
      OLLAMA_SEARCH_MODEL: llama3.1:8b
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - scraper_east_history:/app/history  # read Yelp budget from scraper volume
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # East instance: AL AR CT DE FL GA IL IN IA KY LA ME MD MA MI MN MS MO NH NJ NY NC ND OH PA RI SC SD TN VT VA WV WI
  scraper-east:
    build: ./scraper
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://leadgen:${POSTGRES_PASSWORD}@postgres:5432/leadgen
      PYTHONUNBUFFERED: "1"
      SCRAPER_INSTANCE: east
      YELP_API_KEY: ${YELP_API_KEY:-}
      FOURSQUARE_API_KEY: ${FOURSQUARE_API_KEY:-}
    volumes:
      - ./scraper:/app
      - scraper_east_history:/app/history
    restart: unless-stopped
    command: python main.py --schedule

  # West instance: AK AZ CA CO HI ID KS MT NE NV NM OK OR TX UT WA WY
  scraper-west:
    build: ./scraper
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://leadgen:${POSTGRES_PASSWORD}@postgres:5432/leadgen
      PYTHONUNBUFFERED: "1"
      SCRAPER_INSTANCE: west
      YELP_API_KEY: ${YELP_API_KEY:-}
      FOURSQUARE_API_KEY: ${FOURSQUARE_API_KEY:-}
    volumes:
      - ./scraper:/app
      - scraper_west_history:/app/history
    restart: unless-stopped
    command: python main.py --schedule

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  pgdata:
  ollama_models:
  scraper_east_history:
  scraper_west_history:
